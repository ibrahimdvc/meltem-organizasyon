<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meltem Kimya – Organizasyon Şeması</title>
<style>
  :root{
    --navy:#23215c;
    --blue:#2f5496;
    --blue-dark:#1f3864;
    --line:#8fa3c8;
    --bg:#eef1f7;
    --print-zoom:1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;background:var(--bg);color:#1c2430;overflow:hidden}

  /* ---------- GİRİŞ EKRANI ---------- */
  #loginOverlay{position:fixed;inset:0;background:linear-gradient(160deg,#23215c 0%,#2f5496 100%);
    display:flex;align-items:center;justify-content:center;z-index:1000}
  .loginCard{background:#fff;border-radius:14px;padding:38px 42px;width:380px;max-width:92vw;
    box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center}
  .loginCard img{width:240px;max-width:100%;margin-bottom:14px}
  .loginCard h1{font-size:15px;font-weight:600;color:var(--navy);letter-spacing:.5px;margin-bottom:22px}
  .loginCard input{width:100%;padding:11px 13px;border:1.5px solid #c8d0e0;border-radius:8px;font-size:15px;
    text-align:center;letter-spacing:2px;outline:none}
  .loginCard input:focus{border-color:var(--blue)}
  .loginCard button{width:100%;margin-top:14px;padding:11px;border:none;border-radius:8px;background:var(--navy);
    color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  .loginCard button:hover{background:var(--blue-dark)}
  #loginMsg{min-height:20px;font-size:13px;color:#c0392b;margin-top:10px}
  #loginHint{font-size:12px;color:#7a8499;margin-top:12px}
  .shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

  /* ---------- ÜST ARAÇ ÇUBUĞU ---------- */
  #toolbar{position:fixed;top:0;left:0;right:0;height:56px;background:#fff;border-bottom:1px solid #d8deea;
    display:flex;align-items:center;gap:8px;padding:0 14px;z-index:500;box-shadow:0 2px 8px rgba(20,30,60,.06)}
  #toolbar img{height:30px;margin-right:6px}
  .tbGroup{display:flex;align-items:center;gap:6px;padding:0 10px;border-left:1px solid #e3e8f1}
  .tbGroup:first-of-type{border-left:none}
  .btn{border:1px solid #c8d0e0;background:#fff;border-radius:7px;padding:7px 12px;font-size:13px;cursor:pointer;
    color:#2a3550;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .btn:hover{background:#f0f4fb;border-color:var(--blue)}
  .btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
  .btn.primary:hover{background:var(--blue-dark)}
  .btn.danger{color:#b03030}
  .btn.danger:hover{background:#fdf0f0;border-color:#d08080}
  #zoomPct{font-size:13px;min-width:46px;text-align:center;color:#5a6478}
  #saveBadge{font-size:12px;color:#2e8b57;opacity:0;transition:opacity .4s;margin-left:auto;margin-right:8px}
  #toolbar .spacer{flex:1}

  /* ---------- ŞEMA ALANI ---------- */
  #chartScroll{position:absolute;top:56px;bottom:0;left:0;right:0;overflow:auto;cursor:grab}
  #chartScroll.dragging{cursor:grabbing;user-select:none}
  #chartZoom{transform-origin:0 0;width:max-content;min-width:100%;padding:10px 40px 60px}

  #printHeader{display:flex;align-items:center;justify-content:center;gap:18px;padding:18px 0 4px}
  #printHeader img{height:36px}
  #printHeader .phTitle{font-size:19px;font-weight:700;color:var(--navy);letter-spacing:1px}
  #printHeader .phDate{font-size:12px;color:#6a7490;align-self:flex-end;padding-bottom:3px}

  /* ---------- AĞAÇ ---------- */
  .tree{width:max-content;margin:0 auto;padding-top:6px}
  .tree ul{display:flex;justify-content:center;position:relative;padding-top:26px;list-style:none}
  .tree>ul{padding-top:0}
  .tree ul ul::before{content:'';position:absolute;top:0;left:50%;width:0;height:26px;border-left:2px solid var(--line)}
  .tree li{display:flex;flex-direction:column;align-items:center;position:relative;padding:26px 7px 0}
  .tree>ul>li{padding-top:0}
  .tree li::before,.tree li::after{content:'';position:absolute;top:0;right:50%;width:50%;height:26px;border-top:2px solid var(--line)}
  .tree li::after{right:auto;left:50%;border-left:2px solid var(--line)}
  .tree li:only-child::before,.tree li:only-child::after{display:none}
  .tree li:only-child{padding-top:26px}
  .tree>ul>li:only-child{padding-top:0}
  .tree ul ul>li:only-child::after{content:'';display:block;position:absolute;top:0;left:50%;width:0;height:26px;
    border-top:none;border-left:2px solid var(--line)}
  .tree li:first-child::before,.tree li:last-child::after{border:none}
  .tree li:last-child::before{border-right:2px solid var(--line);border-radius:0 8px 0 0}
  .tree li:first-child::after{border-radius:8px 0 0 0}
  .tree>ul>li::before,.tree>ul>li::after{display:none}

  /* ---------- KUTULAR ---------- */
  .node{position:relative;min-width:150px;max-width:210px;border:1.5px solid var(--blue);border-radius:6px;
    background:#fff;box-shadow:0 2px 6px rgba(30,50,100,.13);cursor:pointer;transition:box-shadow .15s}
  .node:hover{box-shadow:0 4px 14px rgba(30,50,100,.3)}
  .ntitle{background:linear-gradient(180deg,var(--blue) 0%,var(--blue-dark) 100%);color:#fff;font-size:12.5px;
    font-weight:600;padding:7px 9px;border-radius:4px 4px 0 0;line-height:1.3}
  .node.leafEmpty .ntitle{border-radius:4px}
  .npeople{padding:4px 8px 6px}
  .person{font-size:11.5px;padding:3px 0;border-bottom:1px dashed #e3e8f1;line-height:1.25}
  .person:last-child{border-bottom:none}
  .prole{display:block;font-size:10px;color:#69748e}
  .addChildBtn{position:absolute;left:50%;bottom:-11px;transform:translateX(-50%);width:21px;height:21px;border-radius:50%;
    background:var(--navy);color:#fff;border:2px solid #fff;font-size:14px;line-height:16px;text-align:center;
    cursor:pointer;opacity:0;transition:opacity .15s;z-index:5;box-shadow:0 1px 4px rgba(0,0,0,.3)}
  .node:hover .addChildBtn{opacity:1}
  .addChildBtn:hover{background:var(--blue)}

  /* ---------- MODALLAR ---------- */
  .modalBack{position:fixed;inset:0;background:rgba(20,25,50,.45);display:none;align-items:flex-start;
    justify-content:center;z-index:800;padding-top:8vh}
  .modalBack.open{display:flex}
  .modal{background:#fff;border-radius:12px;width:460px;max-width:94vw;max-height:82vh;overflow:auto;
    box-shadow:0 18px 50px rgba(0,0,0,.3);padding:22px 24px}
  .modal h2{font-size:16px;color:var(--navy);margin-bottom:16px}
  .modal label{display:block;font-size:12px;color:#5a6478;margin:10px 0 4px;font-weight:600}
  .modal input[type=text],.modal input[type=password]{width:100%;padding:9px 11px;border:1.5px solid #c8d0e0;
    border-radius:7px;font-size:14px;outline:none}
  .modal input:focus{border-color:var(--blue)}
  .personRow{display:flex;gap:6px;margin-bottom:6px;align-items:center}
  .personRow input{flex:1}
  .personRow .rm{border:none;background:#fdeaea;color:#b03030;border-radius:6px;width:30px;height:34px;
    cursor:pointer;font-size:15px;flex:none}
  .personRow .rm:hover{background:#f8d3d3}
  .modalBtns{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
  .modalBtns .spacer{flex:1}
  #editorMsg{font-size:12px;color:#b03030;margin-top:8px;min-height:16px}
  .hintSmall{font-size:11px;color:#8a93a8;margin-top:6px}

  /* ---------- BASKI ---------- */
  @page{size:A4 landscape;margin:8mm}
  @media print{
    body{background:#fff;overflow:visible}
    #toolbar,#loginOverlay,.modalBack,.addChildBtn{display:none !important}
    #chartScroll{position:static;overflow:visible}
    #chartZoom{transform:none !important;padding:0;width:max-content;zoom:var(--print-zoom)}
    #printHeader{padding:4px 0 10px}
    .node{box-shadow:none}
    .node,.ntitle{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>

<script>
"use strict";
/* ============ SABİTLER ============ */
const LS_DATA = "mk_org_data_v2";
const LS_PASS = "mk_org_pass_v1";
const DEFAULT_PASS = "meltem2026";

/* ============ ŞİFRELEME ============ */
async function hashPw(pw){
  const txt = "mk-salt-2026::" + pw;
  if (window.crypto && crypto.subtle) {
    try {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    } catch(e){ /* fallback'e düş */ }
  }
  // Yedek (basit) karma — subtle crypto yoksa
  let h1 = 0x811c9dc5, h2 = 0x01000193;
  for (let i=0;i<txt.length;i++){
    h1 = Math.imul(h1 ^ txt.charCodeAt(i), 16777619) >>> 0;
    h2 = Math.imul(h2 + txt.charCodeAt(i), 2654435761) >>> 0;
  }
  return "fb_" + h1.toString(16) + h2.toString(16);
}
async function getStoredHash(){
  const s = localStorage.getItem(LS_PASS);
  if (s) return s;
  return await hashPw(DEFAULT_PASS);
}
function isDefaultPass(){ return !localStorage.getItem(LS_PASS); }

/* ============ VERİ ============ */
function uid(){ return "n" + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function mkNode(title, people, children){
  return { id: uid(), title: title, people: people||[], children: children||[] };
}
function vardiya(grup){
  return mkNode("Vardiya Amiri\n" + grup + " Grubu", [{name:"Ad Soyad",role:"Vardiya Amiri"}], [
    mkNode("Operatörler", [{name:"Ad Soyad",role:"Operatör"},{name:"Ad Soyad",role:"Operatör"}])
  ]);
}
function defaultData(){
  return mkNode("TEKNİK BİRİMLER\nGENEL MÜDÜR YARDIMCISI", [{name:"Ad Soyad",role:""}], [
    mkNode("KIDEMLİ İŞLETMELER MÜDÜRÜ", [{name:"Ad Soyad",role:""}], [
      mkNode("ÜRETİM MÜDÜRÜ", [{name:"Ad Soyad",role:""}], [
        mkNode("ÜRETİM GRUBU", [{name:"Ad Soyad",role:""}], [
          vardiya("A"), vardiya("B"), vardiya("C"), vardiya("D")
        ])
      ]),
      mkNode("MAKİNE-ELEKTRİK\nBAKIM MÜDÜRÜ", [{name:"Ad Soyad",role:""}], [
        mkNode("Makine (Mekanik) Bakım", [{name:"Ad Soyad",role:"Bakım Teknikeri"}]),
        mkNode("Elektrik Bakım", [{name:"Ad Soyad",role:"Elektrik Teknikeri"}])
      ])
    ])
  ]);
}
let root = null;
let undoStack = [];

function loadData(){
  try {
    const s = localStorage.getItem(LS_DATA);
    if (s) { root = JSON.parse(s); return; }
  } catch(e){}
  root = defaultData();
}
function saveData(){
  try { localStorage.setItem(LS_DATA, JSON.stringify(root)); } catch(e){}
  const b = document.getElementById("saveBadge");
  b.style.opacity = 1;
  clearTimeout(saveData._t);
  saveData._t = setTimeout(()=>{ b.style.opacity = 0; }, 1500);
}
function pushUndo(){
  undoStack.push(JSON.stringify(root));
  if (undoStack.length > 30) undoStack.shift();
}
function findNode(id, node, parent){
  node = node || root; parent = parent || null;
  if (node.id === id) return { node, parent };
  for (const c of node.children){
    const r = findNode(id, c, node);
    if (r) return r;
  }
  return null;
}

/* ============ AĞAÇ ÇİZİMİ ============ */
function renderTree(){
  const tree = document.getElementById("tree");
  tree.innerHTML = "";
  const ul = document.createElement("ul");
  ul.appendChild(renderNode(root));
  tree.appendChild(ul);
}
function renderNode(n){
  const li = document.createElement("li");
  const box = document.createElement("div");
  box.className = "node" + ((!n.people || !n.people.length) ? " leafEmpty" : "");
  box.dataset.id = n.id;

  const t = document.createElement("div");
  t.className = "ntitle";
  t.textContent = "";
  String(n.title||"").split("\n").forEach((line,i)=>{
    if (i) t.appendChild(document.createElement("br"));
    t.appendChild(document.createTextNode(line));
  });
  box.appendChild(t);

  if (n.people && n.people.length){
    const pp = document.createElement("div");
    pp.className = "npeople";
    n.people.forEach(p=>{
      const d = document.createElement("div");
      d.className = "person";
      d.textContent = p.name;
      if (p.role){
        const r = document.createElement("span");
        r.className = "prole";
        r.textContent = p.role;
        d.appendChild(r);
      }
      pp.appendChild(d);
    });
    box.appendChild(pp);
  }

  const add = document.createElement("div");
  add.className = "addChildBtn";
  add.textContent = "+";
  add.title = "Alt dal ekle";
  add.addEventListener("click", e=>{
    e.stopPropagation();
    pushUndo();
    const child = mkNode("Yeni Birim", []);
    n.children.push(child);
    saveData(); renderTree();
    openEditor(child.id);
  });
  box.appendChild(add);

  box.addEventListener("click", ()=> openEditor(n.id));
  li.appendChild(box);

  if (n.children && n.children.length){
    const ul = document.createElement("ul");
    n.children.forEach(c=> ul.appendChild(renderNode(c)));
    li.appendChild(ul);
  }
  return li;
}

/* ============ DÜZENLEYİCİ ============ */
let editId = null;
const edBack = document.getElementById("editorBack");

function openEditor(id){
  const f = findNode(id);
  if (!f) return;
  editId = id;
  document.getElementById("edTitle").value = f.node.title || "";
  const wrap = document.getElementById("edPeople");
  wrap.innerHTML = "";
  (f.node.people||[]).forEach(p=> addPersonRow(p.name, p.role));
  document.getElementById("editorMsg").textContent = "";
  document.getElementById("edDelete").style.display = f.parent ? "" : "none";
  document.getElementById("edMoveLeft").style.display = f.parent ? "" : "none";
  document.getElementById("edMoveRight").style.display = f.parent ? "" : "none";
  edBack.classList.add("open");
  document.getElementById("edTitle").focus();
}
function addPersonRow(name, role){
  const wrap = document.getElementById("edPeople");
  const row = document.createElement("div");
  row.className = "personRow";
  const i1 = document.createElement("input");
  i1.type = "text"; i1.placeholder = "Ad Soyad"; i1.value = name||""; i1.className = "pName";
  const i2 = document.createElement("input");
  i2.type = "text"; i2.placeholder = "Görev (isteğe bağlı)"; i2.value = role||""; i2.className = "pRole";
  const rm = document.createElement("button");
  rm.className = "rm"; rm.textContent = "✕"; rm.title = "Kişiyi kaldır";
  rm.addEventListener("click", ()=> row.remove());
  row.append(i1, i2, rm);
  wrap.appendChild(row);
  return row;
}
document.getElementById("edAddPerson").addEventListener("click", ()=>{
  addPersonRow("","").querySelector(".pName").focus();
});
function collectEditor(){
  const title = document.getElementById("edTitle").value.trim();
  if (!title){ document.getElementById("editorMsg").textContent = "Birim adı boş olamaz."; return null; }
  const people = [];
  document.querySelectorAll("#edPeople .personRow").forEach(r=>{
    const name = r.querySelector(".pName").value.trim();
    const role = r.querySelector(".pRole").value.trim();
    if (name) people.push({name, role});
  });
  return { title, people };
}
document.getElementById("edSave").addEventListener("click", ()=>{
  const v = collectEditor();
  if (!v) return;
  const f = findNode(editId);
  if (f){ pushUndo(); f.node.title = v.title; f.node.people = v.people; saveData(); renderTree(); }
  edBack.classList.remove("open");
});
document.getElementById("edCancel").addEventListener("click", ()=> edBack.classList.remove("open"));
document.getElementById("edAddChild").addEventListener("click", ()=>{
  const v = collectEditor();
  if (!v) return;
  const f = findNode(editId);
  if (!f) return;
  pushUndo();
  f.node.title = v.title; f.node.people = v.people;
  const child = mkNode("Yeni Birim", []);
  f.node.children.push(child);
  saveData(); renderTree();
  openEditor(child.id);
});
document.getElementById("edDelete").addEventListener("click", ()=>{
  const f = findNode(editId);
  if (!f || !f.parent) return;
  const cnt = countNodes(f.node);
  const msg = cnt > 1
    ? "Bu dal ve altındaki " + (cnt-1) + " alt dal silinecek. Emin misiniz?"
    : "Bu dal silinecek. Emin misiniz?";
  if (!confirm(msg)) return;
  pushUndo();
  f.parent.children = f.parent.children.filter(c=> c.id !== editId);
  saveData(); renderTree();
  edBack.classList.remove("open");
});
function countNodes(n){ return 1 + (n.children||[]).reduce((a,c)=>a+countNodes(c),0); }
function moveSibling(dir){
  const f = findNode(editId);
  if (!f || !f.parent) return;
  const arr = f.parent.children;
  const i = arr.indexOf(f.node);
  const j = i + dir;
  if (j < 0 || j >= arr.length) return;
  pushUndo();
  arr.splice(i,1); arr.splice(j,0,f.node);
  saveData(); renderTree();
}
document.getElementById("edMoveLeft").addEventListener("click", ()=> moveSibling(-1));
document.getElementById("edMoveRight").addEventListener("click", ()=> moveSibling(1));
edBack.addEventListener("mousedown", e=>{ if (e.target === edBack) edBack.classList.remove("open"); });

/* ============ GERİ AL ============ */
document.getElementById("undoBtn").addEventListener("click", doUndo);
function doUndo(){
  if (!undoStack.length) return;
  root = JSON.parse(undoStack.pop());
  saveData(); renderTree();
}
document.addEventListener("keydown", e=>{
  if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="z" && !edBack.classList.contains("open")){
    e.preventDefault(); doUndo();
  }
});

/* ============ YAKINLAŞTIRMA & KAYDIRMA ============ */
let zoom = 1;
const chartZoom = document.getElementById("chartZoom");
const chartScroll = document.getElementById("chartScroll");
function applyZoom(){
  chartZoom.style.transform = "scale(" + zoom + ")";
  document.getElementById("zoomPct").textContent = Math.round(zoom*100) + "%";
}
document.getElementById("zoomIn").addEventListener("click", ()=>{ zoom = Math.min(2, zoom+0.1); applyZoom(); });
document.getElementById("zoomOut").addEventListener("click", ()=>{ zoom = Math.max(0.2, zoom-0.1); applyZoom(); });
document.getElementById("zoomFit").addEventListener("click", fitToScreen);
function fitToScreen(){
  const w = chartZoom.scrollWidth;
  const availW = chartScroll.clientWidth - 20;
  zoom = Math.min(1, availW / w);
  if (zoom < 0.2) zoom = 0.2;
  applyZoom();
  chartScroll.scrollLeft = 0;
}
// Ctrl + tekerlek ile yakınlaştırma
chartScroll.addEventListener("wheel", e=>{
  if (!e.ctrlKey) return;
  e.preventDefault();
  zoom = Math.min(2, Math.max(0.2, zoom + (e.deltaY < 0 ? 0.08 : -0.08)));
  applyZoom();
}, {passive:false});
// Sürükleyerek kaydırma
let drag = null;
chartScroll.addEventListener("mousedown", e=>{
  if (e.target.closest(".node") || e.button !== 0) return;
  drag = { x: e.clientX, y: e.clientY, sl: chartScroll.scrollLeft, st: chartScroll.scrollTop };
  chartScroll.classList.add("dragging");
});
window.addEventListener("mousemove", e=>{
  if (!drag) return;
  chartScroll.scrollLeft = drag.sl - (e.clientX - drag.x);
  chartScroll.scrollTop  = drag.st - (e.clientY - drag.y);
});
window.addEventListener("mouseup", ()=>{ drag = null; chartScroll.classList.remove("dragging"); });

/* ============ BASKI / PDF ============ */
function preparePrint(){
  // A4 yatay, 8mm kenar boşluğu: ~1062 x 733 px yazdırılabilir alan (96dpi)
  const headerH = 70;
  const availW = 1052, availH = 733 - headerH;
  const w = document.getElementById("tree").offsetWidth;
  const h = document.getElementById("tree").offsetHeight;
  let z = Math.min(availW / w, availH / h, 1.4);
  if (!isFinite(z) || z <= 0) z = 1;
  document.documentElement.style.setProperty("--print-zoom", z.toFixed(4));
}
document.getElementById("printBtn").addEventListener("click", ()=>{
  preparePrint();
  window.print();
});
window.addEventListener("beforeprint", preparePrint);

/* ============ YEDEKLEME ============ */
document.getElementById("exportBtn").addEventListener("click", ()=>{
  const blob = new Blob([JSON.stringify(root, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = "meltem-organizasyon-yedek-" + d.toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
});
document.getElementById("importBtn").addEventListener("click", ()=> document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e=>{
  const file = e.target.files[0];
  if (!file) return;
  const fr = new FileReader();
  fr.onload = ()=>{
    try {
      const data = JSON.parse(fr.result);
      if (!data || typeof data.title !== "string" || !Array.isArray(data.children))
        throw new Error("biçim");
      if (!confirm("Mevcut şema yedekteki ile değiştirilecek. Devam edilsin mi?")) return;
      pushUndo();
      root = data;
      saveData(); renderTree(); fitToScreen();
    } catch(err){
      alert("Geçersiz yedek dosyası. Lütfen bu uygulamadan alınmış bir .json yedeği seçin.");
    }
  };
  fr.readAsText(file, "UTF-8");
  e.target.value = "";
});

/* ============ GİRİŞ / KİLİT ============ */
const loginOverlay = document.getElementById("loginOverlay");
const pwInput = document.getElementById("pwInput");
async function tryLogin(){
  const h = await hashPw(pwInput.value);
  const stored = await getStoredHash();
  if (h === stored){
    pwInput.value = "";
    document.getElementById("loginMsg").textContent = "";
    loginOverlay.style.display = "none";
    document.getElementById("toolbar").style.display = "flex";
    chartScroll.style.display = "block";
    if (!tryLogin._init){
      tryLogin._init = true;
      renderTree();
      fitToScreen();
    }
  } else {
    document.getElementById("loginMsg").textContent = "Hatalı şifre.";
    const c = document.getElementById("loginCard");
    c.classList.remove("shake"); void c.offsetWidth; c.classList.add("shake");
    pwInput.select();
  }
}
document.getElementById("loginBtn").addEventListener("click", tryLogin);
pwInput.addEventListener("keydown", e=>{ if (e.key === "Enter") tryLogin(); });
document.getElementById("lockBtn").addEventListener("click", ()=>{
  document.getElementById("toolbar").style.display = "none";
  chartScroll.style.display = "none";
  loginOverlay.style.display = "flex";
  pwInput.focus();
});
if (isDefaultPass()){
  document.getElementById("loginHint").textContent =
    "İlk giriş şifresi: " + DEFAULT_PASS + "  (girişten sonra mutlaka değiştirin)";
}

/* ============ ŞİFRE DEĞİŞTİRME ============ */
const pwBack = document.getElementById("pwBack");
document.getElementById("pwChangeBtn").addEventListener("click", ()=>{
  ["pwCur","pwNew1","pwNew2"].forEach(id=> document.getElementById(id).value = "");
  document.getElementById("pwMsg").textContent = "";
  pwBack.classList.add("open");
  document.getElementById("pwCur").focus();
});
document.getElementById("pwCancel").addEventListener("click", ()=> pwBack.classList.remove("open"));
pwBack.addEventListener("mousedown", e=>{ if (e.target === pwBack) pwBack.classList.remove("open"); });
document.getElementById("pwSave").addEventListener("click", async ()=>{
  const cur = document.getElementById("pwCur").value;
  const n1 = document.getElementById("pwNew1").value;
  const n2 = document.getElementById("pwNew2").value;
  const msg = document.getElementById("pwMsg");
  if (await hashPw(cur) !== await getStoredHash()){ msg.textContent = "Mevcut şifre hatalı."; return; }
  if (n1.length < 4){ msg.textContent = "Yeni şifre en az 4 karakter olmalı."; return; }
  if (n1 !== n2){ msg.textContent = "Yeni şifreler eşleşmiyor."; return; }
  localStorage.setItem(LS_PASS, await hashPw(n1));
  document.getElementById("loginHint").textContent = "";
  pwBack.classList.remove("open");
  alert("Şifre güncellendi.");
});

/* ============ BAŞLANGIÇ ============ */
document.getElementById("phDate").textContent =
  new Date().toLocaleDateString("tr-TR", {day:"2-digit", month:"long", year:"numeric"});
loadData();
pwInput.focus();
window.addEventListener("resize", ()=>{});
